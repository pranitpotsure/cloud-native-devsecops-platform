# =============================================================================
# grafana.yaml - Grafana deployment with pre-configured dashboards
# =============================================================================

# ── Grafana ConfigMap - datasource (connects to Prometheus) ──────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
        access: proxy
        editable: false

---
# ── Grafana Dashboard ConfigMap ───────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: boutique-dashboards
        orgId: 1
        folder: "Online Boutique"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
# ── Boutique Dashboard JSON ───────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  boutique-overview.json: |
    {
      "title": "Online Boutique - Overview",
      "uid": "boutique-overview",
      "tags": ["boutique", "microservices"],
      "timezone": "browser",
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Total Pods Running",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "targets": [{
            "expr": "count(kube_pod_status_phase{namespace='boutique', phase='Running'})",
            "legendFormat": "Running Pods"
          }]
        },
        {
          "id": 2,
          "title": "CPU Usage by Service",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='boutique'}[5m])) by (pod)",
            "legendFormat": "{{ pod }}"
          }]
        },
        {
          "id": 3,
          "title": "Memory Usage by Service",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{
            "expr": "sum(container_memory_usage_bytes{namespace='boutique'}) by (pod)",
            "legendFormat": "{{ pod }}"
          }]
        },
        {
          "id": 4,
          "title": "Pod Restarts",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{
            "expr": "rate(kube_pod_container_status_restarts_total{namespace='boutique'}[15m])",
            "legendFormat": "{{ pod }}"
          }]
        },
        {
          "id": 5,
          "title": "Network Traffic",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{
            "expr": "sum(rate(container_network_receive_bytes_total{namespace='boutique'}[5m])) by (pod)",
            "legendFormat": "{{ pod }} received"
          }]
        }
      ]
    }

---
# ── Grafana Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472  # grafana user
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "boutique@123"   # Change this!
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:3000"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: storage
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: storage
          emptyDir: {}

---
# ── Grafana Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  type: LoadBalancer   # Expose to browser on AWS
  ports:
    - port: 80
      targetPort: 3000
