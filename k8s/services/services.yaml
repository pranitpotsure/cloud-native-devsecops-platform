                  name: email-secrets
                  key: EMAIL_FROM_ADDRESS
            - name: EMAIL_FROM_NAME
              valueFrom:
                secretKeyRef:
                  name: email-secrets
                  key: EMAIL_FROM_NAME
          resources:
            requests:
