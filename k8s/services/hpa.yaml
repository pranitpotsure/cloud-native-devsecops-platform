# =============================================================================
# HPA - Horizontal Pod Autoscaler
# Automatically scales pods up/down based on CPU/memory usage
# DevSecOps: Prevents DoS by handling traffic spikes gracefully
#
# REQUIRES: metrics-server installed in cluster
# Install: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# =============================================================================

# ── Frontend HPA ──────────────────────────────────────────────────────────────
# Most traffic hits frontend first - scale aggressively
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # Scale up fast on traffic spike
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300  # Scale down slowly (avoid flapping)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

---
# ── CheckoutService HPA ───────────────────────────────────────────────────────
# Critical path - handles order placement
