# =============================================================================
# NetworkPolicies - DevSecOps: Services only talk to who they need to
# This is zero-trust networking inside Kubernetes
# =============================================================================

# ── Default: Deny all ingress traffic ────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: boutique
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# ── Frontend: Accept traffic from Ingress only ────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx

---
# ── CartService: Accept from frontend and checkoutservice only ────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cartservice-policy
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: cartservice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: checkoutservice

---
# ── CheckoutService: Accept from frontend only ────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: checkoutservice-policy
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: checkoutservice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend

---
# ── PaymentService: Accept from checkoutservice only ─────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: paymentservice-policy
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: paymentservice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: checkoutservice

---
# ── EmailService: Accept from checkoutservice only ────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: emailservice-policy
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: emailservice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: checkoutservice

---
# ── Redis: Accept from cartservice only ──────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-policy
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cartservice

---
# ── ProductCatalog: Accept from frontend, checkout, recommendation ────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: productcatalogservice-policy
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: productcatalogservice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: checkoutservice
        - podSelector:
            matchLabels:
              app: recommendationservice
