# =============================================================================
# Ingress - Expose frontend to outside world
# DevSecOps: Only frontend is exposed, all other services are internal only
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: boutique-ingress
  namespace: boutique
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # DevSecOps: Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
