# =============================================================================
# cert-manager.yaml - Free TLS/HTTPS via Let's Encrypt
# Automatically gets and renews SSL certificates
# =============================================================================

# ── Step 1: Install cert-manager CRDs ────────────────────────────────────────
# Run this first:
# kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml

---
# ── Step 2: ClusterIssuer - connects to Let's Encrypt ────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    email: pranitpotsure72@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# ── Step 2b: Staging issuer for testing ──────────────────────────────────────
# Use this first to test without hitting Let's Encrypt rate limits
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: pranitpotsure72@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# ── Step 3: Certificate for frontend ─────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: boutique-tls
  namespace: boutique
spec:
  secretName: boutique-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - your-domain.com        # ← Replace with your domain
    - www.your-domain.com    # ← Replace with your domain

---
# ── Step 4: Updated Ingress with TLS ─────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: boutique-ingress
  namespace: boutique
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # cert-manager will automatically get certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # DevSecOps: Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # DevSecOps: Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # DevSecOps: Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - your-domain.com      # ← Replace with your domain
      secretName: boutique-tls-secret
  rules:
    - host: your-domain.com    # ← Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
